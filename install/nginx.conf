# ─────────────────────────────────────────────────────────────
#  TW Connect — Nginx site configuration
#
#  Save as: /etc/nginx/sites-available/tw-connect
#  Enable:  sudo ln -s /etc/nginx/sites-available/tw-connect \
#                      /etc/nginx/sites-enabled/
#
#  Replace "crm.yourcompany.com" with your actual domain.
#  After enabling, run: sudo certbot --nginx -d crm.yourcompany.com
#  Certbot will add the SSL block automatically.
# ─────────────────────────────────────────────────────────────

# Redirect plain HTTP → HTTPS
server {
    listen 80;
    listen [::]:80;
    server_name crm.yourcompany.com;

    # Let's Encrypt ACME challenge
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# Main HTTPS server
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    server_name crm.yourcompany.com;

    # ── SSL — filled in by Certbot ──────────────────────────
    # ssl_certificate     /etc/letsencrypt/live/crm.yourcompany.com/fullchain.pem;
    # ssl_certificate_key /etc/letsencrypt/live/crm.yourcompany.com/privkey.pem;
    # include             /etc/letsencrypt/options-ssl-nginx.conf;
    # ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    # ── Security headers ────────────────────────────────────
    add_header X-Frame-Options           "SAMEORIGIN"  always;
    add_header X-Content-Type-Options    "nosniff"     always;
    add_header Referrer-Policy           "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy        "geolocation=(), microphone=()" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # ── Gzip ────────────────────────────────────────────────
    gzip on;
    gzip_types text/plain text/css application/json application/javascript
               text/xml application/xml application/xml+rss text/javascript
               image/svg+xml;
    gzip_min_length 1024;
    gzip_vary on;

    # ── API — proxy to Express ───────────────────────────────
    location /api/ {
        proxy_pass         http://127.0.0.1:3001;
        proxy_http_version 1.1;

        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        # Required for cookies to work correctly through the proxy
        proxy_cookie_path  / /;

        # Timeouts
        proxy_connect_timeout 60s;
        proxy_send_timeout    60s;
        proxy_read_timeout    60s;

        # Disable buffering for streaming/SSE if needed in future
        proxy_buffering off;
    }

    # ── React SPA — serve static files ───────────────────────
    root /var/www/tw-connect/client/dist;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cache static assets aggressively
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2?|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # Never cache the HTML entry point (so SPA updates are picked up)
    location = /index.html {
        add_header Cache-Control "no-store, no-cache, must-revalidate";
    }

    # ── Logging ──────────────────────────────────────────────
    access_log /var/log/nginx/tw-connect.access.log;
    error_log  /var/log/nginx/tw-connect.error.log;

    # ── Upload size ──────────────────────────────────────────
    client_max_body_size 10M;
}
