<!DOCTYPE html>
<html lang="en" class="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>01 — Login · TW Connect</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: { extend: { fontFamily: { sans: ['Inter', 'system-ui', 'sans-serif'] } } }
    }
  </script>
  <style>
    * { box-sizing: border-box; }
    body { font-family: 'Inter', system-ui, sans-serif; }
    .input-field {
      width: 100%; background: #27272a; border: 1px solid #3f3f46;
      border-radius: 0.5rem; padding: 0.625rem 0.75rem 0.625rem 2.375rem;
      font-size: 0.875rem; color: #f4f4f5; outline: none; transition: all 0.15s;
    }
    .input-field:focus { border-color: #6366f1; box-shadow: 0 0 0 3px rgba(99,102,241,0.15); }
  </style>
</head>
<body class="bg-zinc-950 text-zinc-100 min-h-screen flex flex-col items-center justify-center p-4 relative overflow-hidden">

  <!-- Ambient glow -->
  <div class="absolute top-0 right-0 w-[500px] h-[500px] rounded-full pointer-events-none"
       style="background: radial-gradient(circle, rgba(99,102,241,0.06) 0%, transparent 70%); transform: translate(30%, -30%);"></div>
  <div class="absolute bottom-0 left-0 w-[400px] h-[400px] rounded-full pointer-events-none"
       style="background: radial-gradient(circle, rgba(99,102,241,0.04) 0%, transparent 70%); transform: translate(-30%, 30%);"></div>

  <div class="w-full max-w-sm relative z-10">

    <!-- Wordmark -->
    <div class="text-center mb-8">
      <div class="inline-flex items-center gap-2.5 justify-center mb-3">
        <div class="w-10 h-10 bg-indigo-600 rounded-xl flex items-center justify-center shadow-lg"
             style="box-shadow: 0 8px 24px rgba(99,102,241,0.35);">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5"
               stroke-linecap="round" stroke-linejoin="round">
            <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/>
            <circle cx="9" cy="7" r="4"/>
            <path d="M23 21v-2a4 4 0 0 0-3-3.87"/>
            <path d="M16 3.13a4 4 0 0 1 0 7.75"/>
          </svg>
        </div>
        <span class="text-2xl font-bold text-zinc-100 tracking-tight">TW Connect</span>
      </div>
      <p class="text-zinc-500 text-sm">Sign in to your workspace</p>
    </div>

    <!-- Card -->
    <div class="rounded-2xl p-7 shadow-2xl" style="background:#18181b; border:1px solid #27272a;">
      <form class="space-y-4">

        <!-- Email -->
        <div>
          <label class="block mb-1.5" style="font-size:0.7rem; font-weight:600; color:#71717a; text-transform:uppercase; letter-spacing:0.06em;">
            Email address
          </label>
          <div class="relative">
            <span class="absolute left-3 top-1/2 -translate-y-1/2" style="color:#52525b;">
              <i data-lucide="mail" style="width:14px;height:14px;"></i>
            </span>
            <input type="email" value="james@tenacityworks.com" class="input-field">
          </div>
        </div>

        <!-- Password -->
        <div>
          <label class="block mb-1.5" style="font-size:0.7rem; font-weight:600; color:#71717a; text-transform:uppercase; letter-spacing:0.06em;">
            Password
          </label>
          <div class="relative">
            <span class="absolute left-3 top-1/2 -translate-y-1/2" style="color:#52525b;">
              <i data-lucide="lock" style="width:14px;height:14px;"></i>
            </span>
            <input type="password" value="supersecret" class="input-field" style="padding-right:2.5rem;">
            <button type="button" class="absolute right-3 top-1/2 -translate-y-1/2 transition-colors"
                    style="color:#52525b;" onmouseover="this.style.color='#a1a1aa'" onmouseout="this.style.color='#52525b'">
              <i data-lucide="eye" style="width:14px;height:14px;"></i>
            </button>
          </div>
        </div>

        <!-- Submit -->
        <button type="submit" class="w-full flex items-center justify-center gap-2 font-semibold rounded-xl transition-all"
                style="background:#4f46e5; color:white; padding:0.7rem 1rem; font-size:0.875rem; margin-top:0.5rem;
                       box-shadow:0 4px 16px rgba(99,102,241,0.3);"
                onmouseover="this.style.background='#6366f1'" onmouseout="this.style.background='#4f46e5'">
          Sign in
          <i data-lucide="arrow-right" style="width:14px;height:14px;"></i>
        </button>

      </form>

      <!-- Divider -->
      <div class="mt-6 pt-5" style="border-top:1px solid #27272a;">
        <p class="text-center leading-relaxed" style="font-size:0.75rem; color:#52525b;">
          Forgotten your password?<br>Contact your workspace admin to have it reset.
        </p>
      </div>
    </div>

    <!-- Security note -->
    <div class="flex items-center justify-center gap-1.5 mt-5" style="color:#3f3f46;">
      <i data-lucide="shield-check" style="width:12px;height:12px;"></i>
      <span style="font-size:0.7rem;">Secured · 5 failed attempts locks account for 15 min</span>
    </div>

  </div>

  <!-- Footer -->
  <footer class="absolute bottom-5 text-center" style="font-size:0.7rem; color:#3f3f46;">
    TW Connect. Built for Tenacity Works.
  </footer>

  <script>lucide.createIcons();</script>
</body>
</html>
